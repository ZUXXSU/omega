name: omega
description: "Omega — Enterprise-grade secure messenger"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Local database (sqflite — no code gen conflicts)
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.4+1
  path_provider: ^2.1.3
  path: ^1.9.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Network
  dio: ^5.7.0
  connectivity_plus: ^6.0.5

  # Push notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  # Media / Files
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  cached_network_image: ^3.3.1
  video_player: ^2.9.2
  photo_view: ^0.15.0

  # Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Utilities
  uuid: ^4.5.0
  intl: ^0.19.0
  logger: ^2.4.0
  equatable: ^2.0.7
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  share_plus: ^10.0.2
  package_info_plus: ^8.1.0
  device_info_plus: ^11.1.0
  shared_preferences: ^2.3.2
  timeago: ^3.7.0

  # QR / Scanner
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0

  # Deep links
  app_links: ^6.3.2

  # Background sync
  workmanager: ^0.5.2

  # Biometric auth
  local_auth: ^2.3.0

  # WebXDC viewer
  webview_flutter: ^4.9.0

  # Audio / Voice
  just_audio: ^0.9.40
  audioplayers: ^6.1.0

  # UI
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8
  flutter_slidable: ^3.1.1
  badges: ^3.1.2
  emoji_picker_flutter: ^4.4.0
  flutter_markdown: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  freezed: ^2.4.1
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
