name: omega
description: "Omega — Enterprise-grade secure messenger"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Local database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Network
  dio: ^5.8.0
  connectivity_plus: ^6.1.4

  # Push notifications
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

  # Media / Files
  image_picker: ^1.1.2
  file_picker: ^8.3.7
  cached_network_image: ^3.4.1
  video_player: ^2.9.3
  photo_view: ^0.15.0

  # Crypto / Security
  pointycastle: ^3.9.1
  flutter_secure_storage: ^9.2.4
  encrypt: ^5.0.3

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  logger: ^2.5.0
  equatable: ^2.0.7
  dartz: ^0.10.1
  permission_handler: ^11.4.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  package_info_plus: ^8.3.0
  device_info_plus: ^11.4.0
  mobile_scanner: ^6.0.4
  qr_flutter: ^4.1.0
  shared_preferences: ^2.3.4
  image_cropper: ^8.0.2

  # Deep links
  app_links: ^6.3.3

  # Background sync
  workmanager: ^0.5.2

  # Biometric auth
  local_auth: ^2.3.0

  # WebXDC viewer
  webview_flutter: ^4.10.0

  # Markdown rendering
  flutter_markdown: ^0.7.7

  # UI
  flutter_svg: ^2.0.17
  lottie: ^3.3.1
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8
  flutter_slidable: ^3.1.1
  badges: ^3.1.2
  timeago: ^3.7.0
  emoji_picker_flutter: ^3.1.3
  record: ^5.2.2
  just_audio: ^0.9.43
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.1
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  isar_generator: ^3.1.0+1
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
